---
# yaml-language-server: $schema=https://raw.githubusercontent.com/k3d-io/k3d/refs/heads/main/pkg/config/v1alpha5/schema.json
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: lab
servers: 1
agents: 1
image: rancher/k3s:v1.35.1-k3s1
registries:
  create:
    host: 0.0.0.0
    hostPort: "5000"
    image: docker.io/library/registry:2
  config: |
    mirrors:
      docker.io:
        endpoint:
          - https://harbor.plexmox.com
        rewrite:
          "^(.*)": "docker.io/$1"
      ghcr.io:
        endpoint:
          - https://harbor.plexmox.com
        rewrite:
          "^(.*)": "ghcr.io/$1"
options:
  k3d:
    wait: true
  k3s:
    extraArgs:
      - arg: --disable=servicelb
        nodeFilters:
          - server:*
      - arg: --disable=traefik
        nodeFilters:
          - server:*
      - arg: --disable=coredns
        nodeFilters:
          - server:*
      - arg: --disable-network-policy
        nodeFilters:
          - server:*
      - arg: --flannel-backend=none
        nodeFilters:
          - server:*
      - arg: --cluster-cidr=10.42.0.0/16
        nodeFilters:
          - server:*
      - arg: --service-cidr=10.43.0.0/16
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
