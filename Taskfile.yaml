version: 3

tasks:
  createCluster:
    desc: Create the k3d cluster
    internal: true
    silent: true
    cmds:
      - |
        if k3d cluster list | grep -q "lab"; then
          echo "Cluster already exists"
        else
          k3d cluster create --config cluster.yaml
        fi

  apps:
    desc: Install Apps
    cmds:
      - helmfile sync --file helmfile.yaml

  up:
    desc: Create the cluster and apply charts
    cmds:
      - task: createCluster
      - task: apps

  down:
    desc: Delete the cluster
    prompt: Are you sure?
    cmds:
      - k3d cluster delete lab
